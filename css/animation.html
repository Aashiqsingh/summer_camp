<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .box{
        height: 200px;
        width: 200px;
        background-color: black;


        animation-name: chotu;
        animation-duration: 2s;
        animation-iteration-count: infinite;
    }
    @keyframes chotu{
        from{
            height: 0px;
            width: 0px;
        }   
        to{
            height: 400px;
            width: 400px;
            background-color: red;
            border-radius: 50%;
            border: 10px dotted yellow;
            margin-left: 300px;
        }
    }
</style>
<body>
    
    <div class="box"></div>



</body>
</html>

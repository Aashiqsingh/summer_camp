<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-image: url('https://static.vecteezy.com/system/resources/previews/008/242/886/large_2x/blue-sky-with-white-cloud-background-free-photo.jpg');
        background-size: 1280px 570px;
    }
    img{
        height: 200px;
        width: 200px;
        position: absolute;
        bottom: 0px;

        animation-name: fly;
        animation-duration: 7s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
    }
    @keyframes fly{
        from{
            left: 0px;
            bottom: 0px;
        }
        to{
            left: 1200px;
            bottom: 500px;
        }
    }
</style>

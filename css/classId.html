<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    .box {
        background-color: blue;
        color: white;
    }
    #para{
        background-color: green;
        color: white;
    }
</style>
<body>

    <!-- there are two selectors
    1. class -- multiple / duplicate [.]
    2. in -- unique [#] 
    -->



    
    <h1 class="box">Royal</h1>
    <h1 class="box">Technosoft</h1>
    <h1>1996</h1>


    <h1 id="para">Chottu</h1>
    <h1 id="para">Hitansh</h1>



</body>
